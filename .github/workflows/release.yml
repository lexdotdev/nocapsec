# Cross-compile and publish binaries to a GitHub Release when a v* tag is pushed.
# Tag and push to trigger:  git tag v0.1.0 && git push origin v0.1.0
name: Release

on:
  push:
    tags: [ 'v*' ]

# GoReleaser needs write access to create the Release and upload assets.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0          # full history + tags so versioning/changelog work

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Release
      uses: goreleaser/goreleaser-action@v6
      with:
        version: '~> v2'
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
